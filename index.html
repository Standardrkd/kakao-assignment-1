<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>킹왕짱 투-두리스트!!</title>
    <!-- Google Fonts - Inter로 깔끔하고 세련된 타이포그래피 적용 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 애플리케이션 헤더 -->
        <header class="app-header">
            <h1 class="app-title">킹왕짱 투-두리스트!!</h1>
            
            <!-- 주간 네비게이터 (주차 이동 및 월 표시) -->
            <div class="week-navigator">
                <div class="week-header">
                    <button id="prev-week-btn" class="nav-btn-arrow" title="이전 주">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                    <!-- 타이틀 툴팁 변경: 오늘 아닐 때는 '오늘로 가기', 오늘일 때는 '달력 팝업 열기' 안내 -->
                    <h2 id="current-month-display" class="month-display" title="오늘 날짜로 이동 / 오늘 날짜인 경우 클릭하여 월 이동">2026년 6월</h2>
                    <button id="next-week-btn" class="nav-btn-arrow" title="다음 주">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                </div>
                <!-- 이번 주 월요일부터 일요일까지 가로 나열되는 그리드 영역 -->
                <div id="week-days-grid" class="week-days-grid">
                    <!-- app.js에서 동적으로 생성되어 삽입됩니다 -->
                </div>
            </div>
        </header>

        <!-- Todo 입력 섹션 -->
        <section class="input-section">
            <form id="todo-form" onsubmit="event.preventDefault();">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="todo-input" 
                        placeholder="새로운 할 일을 입력하세요..." 
                        autocomplete="off"
                        maxlength="100"
                    >
                    <button type="submit" id="add-btn">
                        <span>추가</span>
                    </button>
                </div>
            </form>
        </section>

        <!-- 필터 탭 섹션 (상태별 Todo 필터링) -->
        <section class="filter-section">
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">전체</button>
                <button class="filter-btn" data-filter="active">진행 중</button>
                <button class="filter-btn" data-filter="completed">완료</button>
            </div>
        </section>

        <!-- Todo 목록 섹션 -->
        <section class="list-section">
            <div class="list-header">
                <span class="task-count">남은 할 일: <strong id="pending-count">0</strong>개</span>
            </div>
            <ul id="todo-list" class="todo-list">
                <!-- app.js에서 동적으로 할 일 항목이 추가됩니다 -->
            </ul>
        </section>
    </div>

    <!-- 날짜 이동 네비게이션 모달 팝업 -->
    <div id="month-modal" class="modal-backdrop hidden">
        <div class="modal-card">
            <div class="modal-header">
                <!-- 뒤로가기 버튼 (월 선택 단계로 귀환) -->
                <button id="modal-back-btn" class="nav-btn-arrow hidden" title="이전 단계로 돌아가기">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
                <div class="modal-title-wrapper">
                    <button id="prev-year-btn" class="nav-btn-arrow" title="이전 해">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                    <span id="modal-year-display" class="year-display">2026년</span>
                    <button id="next-year-btn" class="nav-btn-arrow" title="다음 해">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                </div>
                <!-- 우측 마진 정렬용 더미 영역 -->
                <div style="width: 32px;" class="header-spacer" id="modal-header-spacer"></div>
            </div>
            <div class="modal-body">
                <!-- 1단계: 월 선택 뷰 -->
                <div id="modal-months-view" class="months-grid">
                    <button class="month-selector-btn" data-month="0">1월</button>
                    <button class="month-selector-btn" data-month="1">2월</button>
                    <button class="month-selector-btn" data-month="2">3월</button>
                    <button class="month-selector-btn" data-month="3">4월</button>
                    <button class="month-selector-btn" data-month="4">5월</button>
                    <button class="month-selector-btn" data-month="5">6월</button>
                    <button class="month-selector-btn" data-month="6">7월</button>
                    <button class="month-selector-btn" data-month="7">8월</button>
                    <button class="month-selector-btn" data-month="8">9월</button>
                    <button class="month-selector-btn" data-month="9">10월</button>
                    <button class="month-selector-btn" data-month="10">11월</button>
                    <button class="month-selector-btn" data-month="11">12월</button>
                </div>
                <!-- 2단계: 일 선택 뷰 -->
                <div id="modal-days-view" class="days-grid hidden">
                    <!-- app.js에서 동적 생성 -->
                </div>
            </div>
            <div class="modal-footer">
                <button id="close-modal-btn" class="btn btn-cancel">닫기</button>
            </div>
        </div>
    </div>

    <!-- 경고 및 안내 메시지를 표시할 토스트 컨테이너 -->
    <div id="toast-container" class="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
